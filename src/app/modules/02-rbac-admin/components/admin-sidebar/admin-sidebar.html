<aside
  class="sidebar"
  [class.sidebar--collapsed]="isCollapsed()"
  [class.sidebar--mobile-open]="isMobileOpen()"
>
  <div class="sidebar__inner">
    <div class="sidebar__brand">
      <button class="sidebar__logo-btn" (click)="navigateToStore()">
        <svg class="sidebar__logo-icon" viewBox="0 0 303 304" fill="none" xmlns="http://www.w3.org/2000/svg">

          <path d="M17.1254 222.61C-6.56465 171.17 -6.41466 121.46 22.2053 73.7C49.6053 27.97 91.2353 4.42997 144.955 0.0899658C141.115 6.83997 137.835 12.83 134.265 18.63C133.685 19.57 131.855 19.95 130.525 20.16C73.9853 29.44 30.0753 73.04 20.4153 129.87C16.4153 153.41 18.5753 176.51 27.0653 198.86C28.2353 201.93 27.9653 204.15 26.3153 206.78C23.3053 211.6 20.5954 216.6 17.1254 222.61Z" fill="currentColor"/>
          <path d="M258.005 231.29C261.385 237.05 264.545 242.45 267.825 248.03C260.515 257.33 252.055 265.38 242.775 272.56C178.895 322.03 86.6154 311.58 35.1254 249.15C32.9854 246.56 32.8853 244.81 34.6953 242.13C37.4853 238 39.8553 233.59 42.5753 228.99C69.6953 264.81 104.965 284.79 149.725 285.26C194.335 285.75 229.945 266.69 258.005 231.29Z" fill="currentColor"/>
          <path d="M151.735 109.82C149.565 77.2099 191.865 43.2699 225.445 50.3599V83.6999C220.875 84.1699 216.495 84.4099 212.195 85.1099C199.695 87.1499 191.295 94.4399 187.045 106.31C186.005 109.23 184.755 109.93 181.935 109.88C171.855 109.72 161.775 109.82 151.735 109.82Z" fill="currentColor"/>
          <path d="M216.715 116.07H191.195V149.27H216.715V116.07Z" fill="currentColor"/>
        </svg>
      </button>
      <button class="sidebar__close-btn" (click)="closeMobile()" aria-label="Close menu">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <nav class="sidebar__nav">
      @for (item of filteredItems(); track item.route) {
        <a
          [routerLink]="item.route"
          class="sidebar__link"
          routerLinkActive="sidebar__link--active"
          [routerLinkActiveOptions]="{ paths: 'subset', queryParams: 'ignored', fragment: 'ignored', matrixParams: 'ignored' }"
          (click)="closeMobile()"
          [title]="isCollapsed() ? item.label : ''"
        >
          <mat-icon class="sidebar__link-icon">{{ item.icon }}</mat-icon>
          <span class="sidebar__link-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar">{{ getInitial() }}</div>
        <div class="sidebar__user-info">
          <span class="sidebar__user-name">{{ user()?.fullName }}</span>
          <span class="sidebar__user-email">{{ user()?.email }}</span>
        </div>
      </div>
      <div class="sidebar__footer-actions">
        <button class="sidebar__theme-btn" (click)="themeService.toggleTheme()" aria-label="Toggle theme">
          <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
        <button class="sidebar__logout-btn" (click)="logout()">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </div>
  </div>
</aside>

<button class="sidebar__collapse-btn" (click)="toggleCollapse()" aria-label="Toggle sidebar">
  <mat-icon>{{ isCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
</button>

<div class="sidebar__backdrop" [class.sidebar__backdrop--visible]="isMobileOpen()" (click)="closeMobile()"></div>

<button class="sidebar__mobile-toggle" (click)="toggleMobile()" aria-label="Open menu">
  <mat-icon>menu</mat-icon>
</button>
