<div class="permissions-page">
  <breadcrumb />

  <header class="permissions-page__header">
    <div class="permissions-page__header-content">
      <h1 class="permissions-page__title">Permisos</h1>
      <p class="permissions-page__subtitle">
        Catálogo de permisos del sistema. Se sincronizan desde el backend mediante seed.
      </p>
    </div>

    <button
      *hasPermission="PERMISSIONS.PERMISSIONS.CREATE"
      class="admin-btn admin-btn--primary"
      type="button"
      (click)="onSeedPermissions()"
      [disabled]="loading()"
    >
      <i class="ri-database-2-line"></i>
      <span>Sincronizar Seed</span>
    </button>
  </header>

  <app-admin-list-toolbar
    [search]="search()"
    searchPlaceholder="Buscar por nombre, slug o descripción..."
    [hasActiveFilters]="hasActiveFilters()"
    [filterCount]="activeFilterCount()"
    (searchChange)="onSearch($event)"
    (clearFilters)="onClearFilters()"
  >
    <div filters class="permissions-page__filters">
      <label
        class="permissions-page__filter-field"
        [class.permissions-page__filter-field--active]="moduleFilter()"
      >
        <span class="permissions-page__filter-label">
          Módulo
          @if (moduleFilter()) {
            <span class="permissions-page__filter-dot" aria-hidden="true"></span>
          }
        </span>
        <select
          class="permissions-page__filter-select"
          [value]="moduleFilter()"
          (change)="onModuleFilter($any($event.target).value)"
        >
          <option value="">Todos los módulos</option>
          @for (option of moduleOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </label>
      <label
        class="permissions-page__filter-field"
        [class.permissions-page__filter-field--active]="actionFilter()"
      >
        <span class="permissions-page__filter-label">
          Acción
          @if (actionFilter()) {
            <span class="permissions-page__filter-dot" aria-hidden="true"></span>
          }
        </span>
        <select
          class="permissions-page__filter-select"
          [value]="actionFilter()"
          (change)="onActionFilter($any($event.target).value)"
        >
          <option value="">Todas las acciones</option>
          @for (option of actionOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        </select>
      </label>
    </div>
  </app-admin-list-toolbar>

  @if (error()) {
    <div class="permissions-page__error">{{ error() }}</div>
  }

  <app-data-table
    [columns]="columns"
    [data]="data()"
    [loading]="loading()"
    [serverSort]="true"
    [showFooterInfo]="false"
    trackByKey="id"
    [sortKey]="sortBy()"
    [sortDir]="sortDirection()"
    [crud]="tableCrud"
    emptyMessage="No se encontraron permisos"
    (sortChange)="onSort($event)"
  />

  <app-pagination
    [meta]="meta()"
    (pageChange)="onPageChange($event)"
    (limitChange)="onLimitChange($event)"
  />
</div>
