<div class="roles-page">
  <breadcrumb />

  <header class="roles-page__header">
    <div class="roles-page__header-content">
      <h1 class="roles-page__title">Roles</h1>
      <p class="roles-page__subtitle">
        Gestión de roles y sus permisos asociados.
      </p>
    </div>

    <div class="roles-page__header-actions">
      <button
        *hasPermission="PERMISSIONS.ROLES.CREATE"
        class="admin-btn admin-btn--primary"
        type="button"
        (click)="onSeedRoles()"
        [disabled]="loading()"
      >
        <i class="ri-database-2-line"></i>
        <span>Sincronizar Seed</span>
      </button>

      <button
        *hasPermission="PERMISSIONS.ROLES.CREATE"
        class="admin-btn admin-btn--success"
        type="button"
        (click)="onCreateRole()"
      >
        <i class="ri-add-line"></i>
        <span>Crear Rol</span>
      </button>
    </div>
  </header>

  <app-admin-list-toolbar
    [search]="search()"
    searchPlaceholder="Buscar por nombre, slug o descripción..."
    [hasActiveFilters]="hasActiveFilters()"
    [filterCount]="activeFilterCount()"
    (searchChange)="onSearch($event)"
    (clearFilters)="onClearFilters()"
  >
    <div filters class="roles-page__filters">
      <label
        class="roles-page__filter-field"
        [class.roles-page__filter-field--active]="roleTypeFilter() !== 'all'"
      >
        <span class="roles-page__filter-label">
          Tipo de rol
          @if (roleTypeFilter() !== 'all') {
            <span class="roles-page__filter-dot" aria-hidden="true"></span>
          }
        </span>
        <select
          class="roles-page__filter-select"
          [value]="roleTypeFilter()"
          (change)="onRoleTypeFilter($any($event.target).value)"
        >
          <option value="all">Todos</option>
          <option value="system">Del sistema</option>
          <option value="user">Personalizados</option>
        </select>
      </label>

      <label
        class="roles-page__filter-check"
        [class.roles-page__filter-check--active]="showDeleted()"
      >
        <input
          type="checkbox"
          [checked]="showDeleted()"
          (change)="onShowDeletedChange($any($event.target).checked)"
        />
        <span>Mostrar eliminados</span>
      </label>
    </div>
  </app-admin-list-toolbar>

  @if (error()) {
    <div class="roles-page__error">{{ error() }}</div>
  }

  <app-data-table
    [columns]="columns"
    [data]="data()"
    [loading]="loading()"
    [serverSort]="true"
    [showFooterInfo]="false"
    trackByKey="id"
    [sortKey]="sortBy()"
    [sortDir]="sortDirection()"
    [crud]="tableCrud"
    emptyMessage="No se encontraron roles"
    (sortChange)="onSort($event)"
  />

  <app-pagination
    [meta]="meta()"
    (pageChange)="onPageChange($event)"
    (limitChange)="onLimitChange($event)"
  />
</div>
