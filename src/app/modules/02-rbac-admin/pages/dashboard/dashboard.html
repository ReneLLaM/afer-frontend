<div class="dashboard">
  <div class="dashboard__header">
    <h1>Bienvenido, {{ user()?.fullName }}</h1>
    <p class="dashboard__subtitle">Panel de administración</p>
  </div>

  <div class="dashboard__modules">
    @for (module of accessibleModules(); track module.route) {
      <a [routerLink]="module.route" class="dashboard__module-card">
        <mat-icon class="dashboard__module-icon">{{ module.icon }}</mat-icon>
        <span class="dashboard__module-label">{{ module.label }}</span>
      </a>
    } @empty {
      <div class="dashboard__empty">
        <mat-icon class="dashboard__empty-icon">lock</mat-icon>
        <p>No tienes acceso a ningún módulo de administración</p>
        <a routerLink="/" class="dashboard__empty-link">Volver a la tienda</a>
      </div>
    }
  </div>
</div>
