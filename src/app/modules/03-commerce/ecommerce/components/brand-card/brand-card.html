<article class="brand-card">
  <a [routerLink]="getBrandUrl()" [queryParams]="getBrandParams()" class="brand-card__link">
    <div 
      class="brand-card__visual"
      [style.background-color]="brand().backgroundColor || '#ffffff'"
    >
      @if (brand().isFeatured) {
        <div class="brand-card__badge">DESTACADO</div>
      }
      <img 
        [src]="brand().image || 'assets/images/placeholder.png'" 
        [alt]="brand().name"
        class="brand-card__image"
      />
    </div>

    <div class="brand-card__info">
      <h3 class="brand-card__name">{{ brand().name }}</h3>
      <p class="brand-card__description">
        {{ brand().description || 'Explora todos los productos de esta marca.' }}
      </p>
    </div>
  </a>
</article>
