<article class="cart-line" [class.cart-line--loading]="isUpdating()">
  <a [routerLink]="getProductUrl()" class="cart-line__image-link">
    <img [src]="item().product.images | productImage" [alt]="item().product.title" class="cart-line__image" />
  </a>

  <div class="cart-line__body">
    <div class="cart-line__header">
      <div class="cart-line__meta">
        @if (item().product.brand) {
        <span class="cart-line__brand" (click)="onBrandClick($event)">
          {{ item().product.brand.name }}
        </span>
        }
        <span class="cart-line__sku">{{ item().product.sku }}</span>
      </div>
      <button type="button" class="cart-line__remove" (click)="onRemove()" [disabled]="isUpdating()"
        aria-label="Eliminar del carrito">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
      </button>
    </div>

    <a [routerLink]="getProductUrl()" class="cart-line__title">
      {{ item().product.title }}
    </a>

    <div class="cart-line__tags">
      @for (category of item().product.categories | slice: 0 : 2; track category.id) {
      <span class="cart-line__tag" (click)="onCategoryClick($event, category.slug)">
        {{ category.name }}
      </span>
      }
    </div>

    <div class="cart-line__footer">
      <div class="cart-line__qty">
        <button type="button" class="cart-line__qty-btn" (click)="decrement()"
          [disabled]="isUpdating() || item().quantity <= 1" aria-label="Disminuir cantidad">
          −
        </button>
        <span class="cart-line__qty-value">{{ item().quantity }}</span>
        <button type="button" class="cart-line__qty-btn" (click)="increment()" [disabled]="isUpdating()"
          aria-label="Aumentar cantidad">
          +
        </button>
      </div>

      <div class="cart-line__price">
        <span class="cart-line__price-label">Subtotal</span>
        <span class="cart-line__price-amount">
          <span class="currency">Bs.</span>
          {{ item().lineTotal | number: '1.2-2' }}
        </span>
      </div>
    </div>
  </div>
</article>
