<div class="tree-wrapper">

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <div class="tree-header">
    <span class="tree-title">{{ title() }}</span>
    @if (selectedCount() > 0) {
      <span class="count-badge">{{ selectedCount() }} seleccionados</span>
    }
  </div>

  <!-- ── Filter input ──────────────────────────────────────────────────── -->
  <div class="filter-row">
    <input
      class="filter-input"
      type="text"
      autocomplete="off"
      spellcheck="false"
      placeholder="Filtrar por nombre…"
      [ngModel]="filterText()"
      (ngModelChange)="filterText.set($event)"
    />
    @if (filterText()) {
      <button class="filter-clear" type="button" (click)="clearFilter()" aria-label="Limpiar filtro">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    }
  </div>

  <!-- ── Tree body ─────────────────────────────────────────────────────── -->
  <div class="tree-body" role="tree">

    @if (visibleItems().length === 0) {
      <!-- Empty state -->
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <span>No hay resultados para <em>"{{ filterText() }}"</em></span>
        <button type="button" class="empty-clear" (click)="clearFilter()">Limpiar filtro</button>
      </div>

    } @else {

      @for (item of visibleItems(); track item.id) {
        <div
          class="tree-node"
          role="treeitem"
          [attr.aria-expanded]="item.hasChildren ? item.isExpanded : null"
          [attr.aria-checked]="item.checkState === 'indeterminate' ? 'mixed' : (item.checkState === 'checked')"
          [style.--depth]="item.depth"
        >
          <!-- Expand / collapse toggle -->
          <button
            class="toggle-btn"
            type="button"
            [class.is-expanded]="item.isExpanded"
            [class.is-leaf]="!item.hasChildren"
            (click)="item.hasChildren && toggleExpand(item.id)"
            [attr.tabindex]="item.hasChildren ? 0 : -1"
            aria-hidden="true"
          >
            @if (item.hasChildren) {
              <svg viewBox="0 0 10 10" fill="none">
                <path d="M2.5 3.5L5 6.5L7.5 3.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            }
          </button>

          <!-- Checkbox -->
          <button
            class="checkbox"
            type="button"
            role="checkbox"
            [class.is-checked]="item.checkState === 'checked'"
            [class.is-indeterminate]="item.checkState === 'indeterminate'"
            [attr.aria-checked]="item.checkState === 'indeterminate' ? 'mixed' : (item.checkState === 'checked')"
            (click)="toggleCheck(item.id)"
          >
            @if (item.checkState === 'checked') {
              <!-- Checkmark -->
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 6L5 9L10 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            } @else if (item.checkState === 'indeterminate') {
              <!-- Minus / dash -->
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            }
          </button>

          <!-- Label -->
          <span
            class="node-label"
            [class.is-parent]="item.hasChildren"
            (click)="item.hasChildren ? toggleExpand(item.id) : toggleCheck(item.id)"
          >{{ item.label }}</span>
        </div>
      }

    }
  </div>

</div>
