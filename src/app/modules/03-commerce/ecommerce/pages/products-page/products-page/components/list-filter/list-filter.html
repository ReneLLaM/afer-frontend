<div class="list-wrapper">

  <!-- ── Header ────────────────────────────────────────────────────────── -->
  <div class="list-header">
    <span class="list-title">{{ title() }}</span>
    @if (selectedCount() > 0) {
      <span class="count-badge">{{ selectedCount() }} seleccionados</span>
    }
  </div>

  <!-- ── Filter input ──────────────────────────────────────────────────── -->
  <div class="filter-row">
    <input
      class="filter-input"
      type="text"
      autocomplete="off"
      spellcheck="false"
      placeholder="Filtrar por nombre…"
      [ngModel]="filterText()"
      (ngModelChange)="filterText.set($event)"
    />
    @if (filterText()) {
      <button class="filter-clear" type="button" (click)="clearFilter()" aria-label="Limpiar filtro">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    }
  </div>

  <!-- ── List body ─────────────────────────────────────────────────────── -->
  <div class="list-body">

    @if (visibleItems().length === 0) {
      <!-- Empty state -->
      <div class="empty-state">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <span>No hay resultados para <em>"{{ filterText() }}"</em></span>
        <button type="button" class="empty-clear" (click)="clearFilter()">Limpiar filtro</button>
      </div>

    } @else {

      @for (item of visibleItems(); track item.id) {
        <div
          class="list-node"
          (click)="toggleCheck(item.id)"
        >
          <!-- Checkbox -->
          <button
            class="checkbox"
            type="button"
            role="checkbox"
            [class.is-checked]="checkedIds().has(item.id)"
            [attr.aria-checked]="checkedIds().has(item.id)"
          >
            @if (checkedIds().has(item.id)) {
              <!-- Checkmark -->
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 6L5 9L10 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            }
          </button>

          <!-- Label -->
          <span class="node-label">{{ item.name }}</span>
        </div>
      }

    }
  </div>
</div>
