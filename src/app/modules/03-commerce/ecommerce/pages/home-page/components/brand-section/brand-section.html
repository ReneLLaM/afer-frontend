<section class="brand-section" [hidden]="brands().length === 0 && !isLoading()">
  <div class="brand-section__header">
    <div class="brand-section__title-wrapper">
      <h2 class="brand-section__title">Marcas Destacadas</h2>
      <div class="brand-section__accent"></div>
    </div>
    <a routerLink="/marcas" class="brand-section__view-all">Ver todas las marcas &rarr;</a>
  </div>

  <div class="brand-section__carousel">
    <div class="brand-section__track">
      @if (isLoading()) {
        @for (i of [1,2,3,4,5,6]; track i) {
          <div class="brand-skeleton"></div>
        }
      } @else {
        @for (brand of brands(); track brand.id) {
          <app-brand-card [brand]="brand" class="brand-item" />
        }
      }
    </div>
  </div>

  <div class="brand-section__footer">
    <a routerLink="/marcas" class="brand-section__view-all brand-section__view-all--mobile">Ver todas las marcas &rarr;</a>
  </div>
</section>
