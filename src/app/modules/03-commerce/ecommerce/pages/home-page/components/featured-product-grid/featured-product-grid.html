<section class="featured-grid" [hidden]="products().length === 0 && !isLoading()">
  @if (products().length > 0 || isLoading()) {
    <div class="featured-grid__header">
      <div class="featured-grid__title-wrapper">
        <h2 class="featured-grid__title">{{ category()?.name }}</h2>
        <div class="featured-grid__accent"></div>
      </div>
      <a [routerLink]="['/productos']" [queryParams]="{ category: category()?.slug }" class="featured-grid__link featured-grid__link--desktop">
        Ver productos <span class="arrow">&rarr;</span>
      </a>
    </div>
  }

  @if (isLoading()) {
    <div class="featured-grid__grid">
      <skeleton-card [count]="6" />
    </div>
  } @else {
    <div class="featured-grid__grid">
      @for (product of products(); track product.id; let i = $index) {
        <app-product-card-v2 
          [class.hide-mobile]="i >= 3"
          [product]="product" 
        />
      }
    </div>

    <div class="featured-grid__footer">
      <a [routerLink]="['/productos']" [queryParams]="{ category: category()?.slug }" class="featured-grid__link featured-grid__link--mobile">
        Ver todos los productos de {{ category()?.name }} <span class="arrow">&rarr;</span>
      </a>
    </div>
  }
</section>
