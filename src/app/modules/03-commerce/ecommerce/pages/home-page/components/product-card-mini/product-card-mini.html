<article class="product-mini" [routerLink]="getProductUrl()">
  <div class="product-mini__img-container">
    <img 
      [src]="product().images | productImage" 
      [alt]="product().title"
      class="product-mini__img"
      loading="lazy"
    >
    <button 
      class="btn-fav-mini"
      [class.btn-fav-mini--active]="isFavorite()"
      [class.btn-fav-mini--loading]="isToggling()"
      (click)="onFavoriteClick($event)"
      [disabled]="isToggling()"
      [attr.aria-label]="isFavorite() ? 'Quitar de favoritos' : 'Agregar a favoritos'"
    >
      <svg width="14" height="14" viewBox="0 0 24 24" [attr.fill]="isFavorite() ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
      </svg>
    </button>
  </div>

  <div class="product-mini__info">
    <h3 class="product-mini__title">{{ product().title }}</h3>
    <div class="product-mini__price">
      <span class="currency">Bs.</span>
      <span class="amount">{{ product().price | number:'1.2-2' }}</span>
    </div>
  </div>

  <button class="btn-quick-add" (click)="onAddToCart($event)" aria-label="Añadir al carrito">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
      <circle cx="9" cy="21" r="1"/>
      <circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
  </button>
</article>
