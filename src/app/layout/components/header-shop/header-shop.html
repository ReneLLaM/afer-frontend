    <!-- perfil -->
    <button class="user-btn" (click)="openAuthPopover()">
      @if (authStore.isAuthenticated()) {
        <div class="user-avatar">
          {{ authStore.user()?.fullName?.charAt(0)?.toUpperCase() }}
        </div>
      } @else {
        <svg
          class="icon"
          width="35"
          height="37"
          viewBox="0 0 35 37"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >

        <span class="text-login">{{ authStore.user()?.fullName }}</span>
      } @else {
        <span class="text-login">Iniciar Sesión</span>
      }

        class="icon-chevron"
        [class.icon-chevron--open]="authPopover.isOpen()"

        height="16"
        viewBox="0 0 24 24"

        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </button>

    <button class="theme-toggle-btn" (click)="themeService.toggleTheme()">
      <mat-icon>{{ themeService.isDarkMode() ? 'dark_mode' : 'light_mode' }}</mat-icon>
    </button>

         <button class="clear-btn" (click)="clearSearch()" type="button">
           <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
