@if (isOpen()) {
  <div class="auth-popover-backdrop" (click)="close()"></div>
}

<div class="auth-popover" [class.auth-popover--open]="isOpen()">
  <div class="auth-popover__card">

    @if (isAuthenticated()) {
      <!-- Estado: Autenticado -->
      <div class="auth-popover__user-info">
        <div class="auth-popover__avatar">
          {{ user()?.fullName?.charAt(0)?.toUpperCase() }}
        </div>
        <div class="auth-popover__user-details">
          <span class="auth-popover__user-name">{{ user()?.fullName }}</span>
          <span class="auth-popover__user-email">{{ user()?.email }}</span>
        </div>
      </div>

      <div class="auth-popover__divider"></div>

      <button class="auth-popover__item" (click)="navigateToProfile()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Mi Perfil
      </button>

      <button class="auth-popover__item auth-popover__item--danger" (click)="onLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar Sesión
      </button>
    } @else {
      <!-- Estado: No autenticado -->
      <button class="auth-popover__item" (click)="navigateToLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Iniciar Sesión
      </button>

      <button class="auth-popover__item" (click)="navigateToRegister()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="8.5" cy="7" r="4"/>
          <line x1="20" y1="8" x2="20" y2="14"/>
          <line x1="23" y1="11" x2="17" y2="11"/>
        </svg>
        Registrarse
      </button>
    }

  </div>
</div>
