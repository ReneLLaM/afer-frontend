<div class="date-range-field-shell">
  <div class="date-range-field-shell__head">
    <span class="date-range-field-shell__label">{{ label() }}</span>
    <span class="date-range-field-shell__hint">{{ hint() }}</span>
  </div>

  <div class="date-range-field">
    <label class="date-range-field__item">
      <span class="date-range-field__item-label">Inicio</span>
      <div class="date-range-field__input-wrap">
        <input
          type="date"
          class="date-range-field__input"
          [value]="startValue()"
          [attr.placeholder]="startPlaceholder()"
          (input)="emitRange($any($event.target).value, endValue())"
        />
      </div>
    </label>

    <div class="date-range-field__separator-wrap">
      <button type="button" class="date-range-field__range-btn" (click)="openRangePicker()" aria-label="Abrir selector de rango">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="5" width="18" height="16" rx="3"></rect>
          <line x1="16" y1="3.5" x2="16" y2="7"></line>
          <line x1="8" y1="3.5" x2="8" y2="7"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
          <path d="M8 14h3"></path>
          <path d="M13 14h3"></path>
          <path d="M8 17h8"></path>
        </svg>
      </button>
      <span class="date-range-field__separator" aria-hidden="true">hasta</span>

      <div class="date-range-field__picker-proxy-wrap" aria-hidden="true">
        <mat-date-range-input [rangePicker]="rangePicker">
          <input
            matStartDate
            [value]="toDate(startValue())"
            (dateChange)="onRangePickerChange($event.value, toDate(endValue()))"
          />
          <input
            matEndDate
            [value]="toDate(endValue())"
            (dateChange)="onRangePickerChange(toDate(startValue()), $event.value)"
          />
        </mat-date-range-input>
        <mat-date-range-picker #rangePicker></mat-date-range-picker>
      </div>
    </div>

    <label class="date-range-field__item">
      <span class="date-range-field__item-label">Fin</span>
      <div class="date-range-field__input-wrap">
        <input
          type="date"
          class="date-range-field__input"
          [value]="endValue()"
          [attr.placeholder]="endPlaceholder()"
          (input)="emitRange(startValue(), $any($event.target).value)"
        />
      </div>
    </label>
  </div>
</div>
