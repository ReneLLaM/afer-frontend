<label class="table-filter-select" [class.table-filter-select--active]="isActive()">
  @if (label()) {
    <span class="table-filter-select__label">
      {{ label() }}
      @if (isActive()) {
        <span class="table-filter-select__dot" aria-hidden="true"></span>
      }
    </span>
  }
  <select
    class="table-filter-select__control"
    [value]="value()"
    (change)="onChange($event)"
  >
    <option value="">{{ placeholder() }}</option>
    @for (opt of options(); track opt.value) {
      <option [value]="opt.value">{{ opt.label }}</option>
    }
  </select>
</label>
