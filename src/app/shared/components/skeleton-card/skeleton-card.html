@for (item of items; track item) {
  <div class="skeleton-card">
    <!-- Header: Brand + SKU -->
    <div class="skeleton-card__header">
      <div class="skeleton skeleton--pill skeleton--sm"></div>
      <div class="skeleton skeleton--line skeleton--xs"></div>
    </div>

    <!-- Image -->
    <div class="skeleton-card__visual">
      <div class="skeleton skeleton--block"></div>
    </div>

    <!-- Info -->
    <div class="skeleton-card__info">
      <div class="skeleton-card__tags">
        <div class="skeleton skeleton--pill skeleton--xs"></div>
        <div class="skeleton skeleton--pill skeleton--xs"></div>
      </div>
      <div class="skeleton skeleton--line skeleton--full"></div>
      <div class="skeleton skeleton--line skeleton--md"></div>
      <div class="skeleton skeleton--line skeleton--lg"></div>
    </div>

    <!-- Actions -->
    <div class="skeleton-card__actions">
      <div class="skeleton skeleton--btn"></div>
      <div class="skeleton skeleton--icon"></div>
    </div>
  </div>
}
